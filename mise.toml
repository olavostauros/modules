[settings]
quiet = true
task_output = "interleave"
experimental = true

[plugins]
shiv = "https://github.com/KnickKnackLabs/vfox-shiv"

[tools]
bats = "1.13.0"
"aqua:shenwei356/rush" = "0.9.0"
gum = "0.17.0"
jq = "1.8.1"
"shiv:codebase" = "0.3.0"
"shiv:rudi" = "0.5.1"
"shiv:testicles" = "latest"

[_.codebase]
lint = [
  "mise-settings",
  "bats-test-helper",
  "bats-test-task",
  "mcr-scope",
  "or-true",
  "shellcheck",
  "gum-table",
  "caller-pwd-contract",
]
